name: CloudGuardian AI CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Python Installation
        run: python --version

      - name: Run AI Remediation Engine
        run: python scanner/ai_remediation.py

      - name: Run Compliance Engine
        run: python scanner/compliance_scanner.py