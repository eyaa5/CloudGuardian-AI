apiVersion: v1
kind: Pod

metadata:
  name: dangerous-serviceaccount
  namespace: production

spec:
  automountServiceAccountToken: true

  containers:
    - name: nginx
      image: nginx:1.25

      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        readOnlyRootFilesystem: true

      resources:
        limits:
          cpu: "500m"
          memory: "512Mi"

      imagePullPolicy: IfNotPresent